apiVersion: v1
kind: ImportCluster
metadata:
  name: validation-valid-cluster
  description: Fully valid ImportCluster used as the validation baseline
spec:
  git_repository:
    provider: github
    credential_name: User-Example
    repository: example/test-repo
    branch: main
  stacks:
    - name: logging
      description: Stack for validation testing
      manifests:
        - name: namespace-fluent-bit
          from_file: manifests/namespace.yaml
          parents: []
      addons:
        - name: fluent-bit
          chart_name: fluent-bit
          chart_version: 0.49.1
          repository_url: https://fluent.github.io/helm-charts
          namespace: fluent-bit
          configuration_type: standalone
          parents:
            - name: namespace-fluent-bit
              kind: manifest
