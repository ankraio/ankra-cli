name: Lifecycle system test

on:
  schedule:
    # 03:00 UTC every Monday, Wednesday and Friday (cron day-of-week: 1=Mon, 3=Wed, 5=Fri).
    - cron: '0 3 * * 1,3,5'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Space-separated providers to exercise (hetzner ovh upcloud).'
        required: false
        default: 'hetzner ovh upcloud'
      parallel:
        description: 'Run the selected providers concurrently (1) or one at a time (0).'
        required: false
        default: '1'

permissions:
  contents: read

# Each run provisions real, billable cloud infrastructure, so never let two runs
# overlap. A new run waits for the in-progress one to finish (and clean up).
concurrency:
  group: lifecycle-system-test
  cancel-in-progress: false

jobs:
  lifecycle-system-test:
    name: Cloud lifecycle system test
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ANKRA_SYSTEMTEST_CONFIRM: 'yes'
      ANKRA_SYSTEMTEST_PROVIDERS: ${{ github.event.inputs.providers || 'hetzner ovh upcloud' }}
      ANKRA_SYSTEMTEST_PARALLEL: ${{ github.event.inputs.parallel || '1' }}
      ANKRA_API_TOKEN: ${{ secrets.SYSTEMTEST_ANKRA_API_TOKEN }}
      ANKRA_BASE_URL: ${{ vars.SYSTEMTEST_ANKRA_BASE_URL }}
      ANKRA_ORG: ${{ vars.SYSTEMTEST_ANKRA_ORG }}
      SSH_KEY_CREDENTIAL_ID: ${{ secrets.SYSTEMTEST_SSH_KEY_CREDENTIAL_ID }}
      HETZNER_CREDENTIAL_ID: ${{ secrets.SYSTEMTEST_HETZNER_CREDENTIAL_ID }}
      OVH_CREDENTIAL_ID: ${{ secrets.SYSTEMTEST_OVH_CREDENTIAL_ID }}
      UPCLOUD_CREDENTIAL_ID: ${{ secrets.SYSTEMTEST_UPCLOUD_CREDENTIAL_ID }}
      GITOPS_CREDENTIAL_NAME: ${{ vars.SYSTEMTEST_GITOPS_CREDENTIAL_NAME }}
      GITOPS_REPOSITORY: ${{ vars.SYSTEMTEST_GITOPS_REPOSITORY }}
      TMPDIR: ${{ github.workspace }}/systemtest-artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ankra binary
        run: go build -o bin/ankra .

      - name: Run lifecycle system test
        run: |
          mkdir -p "$TMPDIR"
          ./systemtest/lifecycle_systemtest.sh

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-system-test-logs
          path: systemtest-artifacts/**
          if-no-files-found: ignore
          retention-days: 14
