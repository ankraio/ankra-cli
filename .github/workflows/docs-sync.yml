name: Sync CLI reference to ankra-docs

# Regenerates the CLI command reference from the released command tree and
# opens a PR against ankraio/ankra-docs so the public docs never drift from
# the shipped CLI. Requires the DOCS_REPO_TOKEN secret: a fine-grained PAT
# with contents:write + pull-requests:write on ankraio/ankra-docs.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync-docs:
    name: Generate and PR CLI reference
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ankra-cli
        uses: actions/checkout@v6
        with:
          # Full history so manual runs can name a version via git describe.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Checkout ankra-docs
        uses: actions/checkout@v6
        with:
          repository: ankraio/ankra-docs
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: ankra-docs

      - name: Generate CLI reference
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.ref_name }}
        run: |
          # On tag pushes ref_name is the release tag; manual runs name the
          # current commit instead so the docs banner is never stale.
          if [ "$EVENT" = "push" ]; then
            VERSION="$TAG"
          else
            VERSION="$(git describe --tags --always)"
          fi
          go run ./tools/gendocs --out ankra-docs/reference/cli --version "$VERSION"

      - name: Open PR against ankra-docs
        working-directory: ankra-docs
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Stage first: `git diff --quiet` alone is blind to untracked files,
          # which is exactly what a brand-new command family (or the first
          # sync into an empty reference/cli) produces.
          git add reference/cli
          if git diff --cached --quiet; then
            echo "CLI reference unchanged; nothing to sync."
            exit 0
          fi
          # ref_name is the branch (never empty) on workflow_dispatch, so
          # derive the label from the event instead of a ${TAG:-...} fallback.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            LABEL="manual-$RUN_ID"
          else
            LABEL="$TAG"
          fi
          BRANCH="cli-reference/$LABEL"
          git config user.name "ankra-cli-docs-bot"
          git config user.email "engineering@ankra.io"
          git checkout -b "$BRANCH"
          git commit -m "docs: regenerate CLI reference for ankra-cli $LABEL"
          # Force so a re-run of the same tag refreshes its own bot branch
          # instead of failing non-fast-forward.
          git push -u origin "$BRANCH" --force
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Regenerate CLI reference ($LABEL)" \
              --body "Automated update generated by \`tools/gendocs\` in ankra-cli. Review the diff and merge to publish. If pages were added or removed, update the navigation in docs.json to match." \
              --base master
          fi
